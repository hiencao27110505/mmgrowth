<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Team Roadmap — MoMo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ─── Sign-in gate ─────────────────────────────────────────────────── -->
  <div id="gate" class="gate">
    <div class="gate-card">
      <h1 class="gate-title">Team Roadmap</h1>
      <p class="gate-sub">Đăng nhập bằng tài khoản Google để xem roadmap nội bộ.</p>
      <div id="googleBtn"></div>
      <p id="gateError" class="gate-error" hidden></p>
    </div>
  </div>

  <!-- ─── Main app (hidden until signed in & authorized) ───────────────── -->
  <div id="app" hidden>
    <header class="header page-wrap">
      <div class="header-left">
        <h1 class="brand">Team Roadmap</h1>
        <span class="header-sub">What &amp; Why · live from Google Sheet</span>
      </div>
      <div class="header-right">
        <button id="submitBtn" class="btn btn-primary">+ Submit an idea</button>
        <div class="refresh-group">
          <button id="refreshBtn" class="btn btn-ghost" title="Force refresh from sheet">↻</button>
          <span id="lastUpdated" class="updated-label"></span>
        </div>
        <span id="viewerChip" class="chip"></span>
        <button id="signOutBtn" class="btn btn-link">Sign out</button>
      </div>
    </header>

    <main class="page-wrap">
      <!-- Health metrics -->
      <section class="metrics" id="metrics"></section>

      <!-- View switcher -->
      <nav class="tabs">
        <button class="tab is-active" data-view="timeline">Timeline</button>
        <button class="tab" data-view="insights">AI Insights</button>
      </nav>

      <!-- Views -->
      <section id="view-timeline" class="view">
        <div class="filter-bar" id="timelineFilters">
          <label class="filter-pill">
            <span class="filter-label">Owner</span>
            <select id="filterOwner"><option value="">All</option></select>
          </label>
          <label class="filter-pill">
            <span class="filter-label">Status</span>
            <select id="filterStatus"><option value="">All</option></select>
          </label>
          <label class="filter-pill">
            <span class="filter-label">Card quality</span>
            <select id="filterQuality">
              <option value="">All</option>
              <option value="complete">Complete · all fields filled</option>
              <option value="gaps">Has gaps · missing 1+ field</option>
            </select>
          </label>
          <button id="clearFiltersBtn" class="btn btn-link" hidden>Clear filters</button>
          <span id="filterCount" class="filter-count" hidden></span>
        </div>
        <div id="timelineColumns" class="timeline"></div>
      </section>
      <section id="view-insights" class="view" hidden>
        <div class="insights-controls">
          <div class="mode-toggle" role="radiogroup" aria-label="Synthesis mode">
            <button class="mode-pill is-active" data-mode="stakeholder">For stakeholders</button>
            <button class="mode-pill" data-mode="operational">Operational risks</button>
          </div>
          <div class="insights-actions">
            <button id="generateBtn" class="btn btn-primary">Generate synthesis</button>
            <span id="synthesisMeta" class="updated-label"></span>
          </div>
        </div>
        <div id="insightsBody" class="insights-body"></div>
      </section>

      <div id="emptyState" class="empty-state" hidden>
        <p>Không có dữ liệu phù hợp.</p>
      </div>
    </main>

    <footer class="footer page-wrap">
      <span>Data source: Google Sheet "What&amp;Why" · auto-refreshed on reload</span>
    </footer>
  </div>

  <!-- ─── Initiative detail modal (opens on Timeline card click) ──────── -->
  <div id="detailModal" class="modal" hidden>
    <div class="modal-backdrop" data-detail-close></div>
    <div class="modal-card detail-modal-card" role="dialog" aria-labelledby="detailModalTitle">
      <div class="modal-head">
        <h2 id="detailModalTitle">Initiative</h2>
        <button class="btn btn-link" data-detail-close>×</button>
      </div>
      <div id="detailModalBody" class="detail-modal-body"></div>
    </div>
  </div>

  <!-- ─── Submit-an-idea modal (opens from header button) ──────────────── -->
  <div id="submitModal" class="modal" hidden>
    <div class="modal-backdrop" data-submit-close></div>
    <div class="modal-card submit-modal-card" role="dialog" aria-labelledby="submitModalTitle">
      <div class="modal-head">
        <h2 id="submitModalTitle">Submit an idea</h2>
        <button class="btn btn-link" data-submit-close>×</button>
      </div>
      <form id="submitForm" class="idea-form">
        <div class="idea-field">
          <label class="idea-label" for="fObjective">Objective</label>
          <input id="fObjective" name="fObjective" type="text"
                 list="objectiveSuggestions"
                 placeholder="Pick existing or type new — e.g. Reduce eKYC drop-off"
                 autocomplete="off" required />
          <datalist id="objectiveSuggestions"></datalist>
        </div>

        <div class="idea-field" data-field="what">
          <label class="idea-label" for="fWhat">What <span class="idea-label-hint">· 3–5 words</span></label>
          <textarea id="fWhat" rows="1" required placeholder="e.g. NFC fallback for eKYC"></textarea>
        </div>

        <div class="idea-field" data-field="why">
          <label class="idea-label" for="fWhy">Why <span class="idea-label-hint">· user problem + a number</span></label>
          <textarea id="fWhy" rows="3" required placeholder="e.g. 30% of users abandon eKYC after camera scan fails — costs ~200 signups/day."></textarea>
        </div>

        <div class="idea-field" data-field="how">
          <label class="idea-label" for="fHow">How <span class="idea-label-hint">· approach + MVP scope</span></label>
          <textarea id="fHow" rows="2" required placeholder="e.g. Detect NFC-capable phones, offer NFC as primary path. MVP: Android only, iOS in v2."></textarea>
        </div>

        <div class="idea-field-row">
          <div class="idea-field">
            <label class="idea-label" for="fWhen">When <span class="idea-label-hint">· optional</span></label>
            <select id="fWhen" name="fWhen">
              <option value="">— No month —</option>
            </select>
          </div>
          <div class="idea-field">
            <label class="idea-label" for="fUserFlow">User flow <span class="idea-label-hint">· optional, used to generate prototype</span></label>
            <textarea id="fUserFlow" rows="2" placeholder="e.g. 1) Open MoMo → 2) Tap eKYC → 3) Detect NFC → 4) Tap CCCD → 5) Confirm"></textarea>
          </div>
        </div>

        <div id="formError" class="form-error" hidden></div>

        <div class="idea-form-foot">
          <span class="idea-meta-inline">As <strong id="submitterEmail"></strong></span>
          <div class="idea-form-actions">
            <button type="button" class="btn btn-link" data-submit-close>Cancel</button>
            <button type="submit" class="btn btn-primary" id="submitFormBtn">Submit idea</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <!-- ─── Toast ────────────────────────────────────────────────────────── -->
  <div id="toast" class="toast" hidden></div>

  <!-- ─── Loading overlay ──────────────────────────────────────────────── -->
  <div id="loader" class="loader" hidden>
    <div class="spinner"></div>
  </div>

  <!-- Confetti library (small, ~9 KB, used on successful submit) -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js" defer></script>

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="auth.js"></script>
  <script src="app.js"></script>
</body>
</html>
